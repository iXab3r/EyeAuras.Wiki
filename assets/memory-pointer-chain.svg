    <text class="mono" x="110" y="132" font-size="18" text-anchor="middle" dominant-baseline="middle">0x140123456</text>
  </g>

  <path class="line" d="M280 290 C308 290, 322 290, 380 290"/>
  <rect class="label" x="294" y="206" width="72" height="34" rx="12"/>
  <text class="mono" x="330" y="223" font-size="18" text-anchor="middle" dominant-baseline="middle">+0x10</text>

  <text class="mono" x="490" y="108" font-size="18" font-weight="700" text-anchor="middle" dominant-baseline="middle">EntityList</text>
  <g transform="translate(380 135)">
    <rect class="card" x="0" y="0" width="220" height="220" rx="22"/>
    <rect class="chip" x="40" y="56" width="140" height="40" rx="14"/>
    <rect class="chip" x="40" y="112" width="140" height="40" rx="14"/>
    <text class="mono" x="110" y="76" font-size="18" text-anchor="middle" dominant-baseline="middle">PTR</text>
    <text class="mono" x="110" y="132" font-size="18" text-anchor="middle" dominant-baseline="middle">0x10</text>
  </g>

  <path class="line" d="M600 290 C628 290, 642 290, 700 290"/>
  <rect class="label" x="614" y="206" width="72" height="34" rx="12"/>
  <text class="mono" x="650" y="223" font-size="18" text-anchor="middle" dominant-baseline="middle">+0x20</text>

  <text class="mono" x="810" y="108" font-size="18" font-weight="700" text-anchor="middle" dominant-baseline="middle">Entity</text>
  <g transform="translate(700 135)">
