    <rect class="chip-rose" x="40" y="56" width="140" height="40" rx="14"/>
    <rect class="chip-rose" x="40" y="112" width="140" height="40" rx="14"/>
    <text class="mono" x="110" y="76" font-size="18" text-anchor="middle" dominant-baseline="middle">HP</text>
    <text class="mono" x="110" y="132" font-size="18" text-anchor="middle" dominant-baseline="middle">742</text>
