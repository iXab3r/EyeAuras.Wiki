<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="500" viewBox="0 0 1400 500" role="img" aria-labelledby="title desc">
  <title id="title">PTR</title>
  <desc id="desc">PTR / HP</desc>
  <defs>
    <style>
      .bg { fill: #0b1220; }
      .grid { stroke: rgba(148, 163, 184, 0.08); stroke-width: 1; }
      .frame { fill: #111827; stroke: #334155; stroke-width: 2; }
      .card { fill: #0f172a; stroke: #475569; stroke-width: 2; }
      .chip { fill: #0b1220; stroke: #38bdf8; stroke-width: 2; }
      .chip-amber { fill: #0b1220; stroke: #f59e0b; stroke-width: 2; }
      .chip-rose { fill: #0b1220; stroke: #fb7185; stroke-width: 2; }
      .mono { fill: #f8fafc; font-family: Consolas, Menlo, monospace; }
      .line { stroke: #38bdf8; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .label { fill: #0b1220; stroke-width: 2; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#38bdf8" />
    </marker>
    <linearGradient id="bgGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="500" fill="url(#bgGlow)"/>
  <g opacity="0.9">
    <path class="grid" d="M0 80H1400M0 160H1400M0 240H1400M0 320H1400M0 400H1400"/>
    <path class="grid" d="M140 0V500M280 0V500M420 0V500M560 0V500M700 0V500M840 0V500M980 0V500M1120 0V500M1260 0V500"/>
  </g>

  <rect class="frame" x="36" y="36" width="1328" height="428" rx="26"/>

  <text class="mono" x="170" y="108" font-size="18" font-weight="700" text-anchor="middle" dominant-baseline="middle">Module</text>
  <g transform="translate(60 135)">
